<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>the kachoo · guestbook · centered</title>
  <!-- Inter font + Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #d9d9d9 0%, #f0f0f0 100%);
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      color: #000;
    }

    /* background motion halus - lebih subtle */
    .motion-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .motion-bg span {
      position: absolute;
      display: block;
      width: 2px;
      height: 2px;
      background: rgba(0, 0, 0, 0.06);
      border-radius: 50%;
      animation: floatParticle 16s infinite linear;
    }

    @keyframes floatParticle {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10% { opacity: 0.2; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-120vh) translateX(20px) scale(0.5); opacity: 0; }
    }

    .motion-bg .line {
      position: absolute;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.04), transparent);
      animation: slideLine 15s infinite ease-in-out;
    }

    @keyframes slideLine {
      0% { transform: translateX(-100%); opacity: 0; }
      50% { opacity: 0.15; }
      100% { transform: translateX(100%); opacity: 0; }
    }

    /* ===== CONTAINER GLASS BLEAM PUTIH ===== */
    .glass-card {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 1000px; /* lebih proporsional */
      margin: 0 auto; /* center horizontal */
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px) saturate(200%);
      -webkit-backdrop-filter: blur(20px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 60px;
      padding: 2.5rem 2.5rem;
      box-shadow: 0 25px 50px -15px rgba(0,0,0,0.2), inset 0 1px 3px rgba(255,255,255,0.9);
      transition: box-shadow 0.3s, border-color 0.3s;
      animation: cardAppear 0.8s ease-out;
      color: #000;
    }

    @keyframes cardAppear {
      0% { opacity: 0; transform: scale(0.97) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .glass-card:hover {
      border-color: rgba(255,255,255,0.9);
      box-shadow: 0 35px 70px -15px rgba(0,0,0,0.25), inset 0 1px 4px white;
    }

    /* HEADER GUESTBOOK - selalu di tengah */
    .guestbook-header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: slideDown 0.7s ease-out;
    }

    @keyframes slideDown {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .guestbook-header h1 {
      font-size: clamp(2.8rem, 7vw, 4.8rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      color: #000;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 0.3rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .guestbook-header p {
      font-size: 1.1rem;
      font-weight: 300;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      display: inline-block;
      padding-bottom: 0.4rem;
    }

    /* grid dua kolom - rapi di desktop, stack di mobile */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin: 2rem 0 2.5rem;
    }

    /* INVITATION SECTION */
    .invitation-section {
      background: rgba(255, 255, 255, 0.6);
      border-radius: 40px;
      padding: 1.8rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(5px);
      transition: 0.3s;
      animation: fadeIn 0.8s ease;
      box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
    }

    .form-section {
      background: rgba(255, 255, 255, 0.7);
      border-radius: 40px;
      padding: 1.8rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      transition: 0.3s;
      animation: fadeIn 0.8s ease;
      box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .invitation-section:hover, .form-section:hover {
      background: rgba(255, 255, 255, 0.8);
      border-color: white;
      box-shadow: 0 15px 30px -12px rgba(0,0,0,0.15);
    }

    .invitation-section h2, .form-section h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #000;
      margin-bottom: 1.5rem;
      letter-spacing: -0.3px;
      border-left: 4px solid #000;
      padding-left: 1rem;
    }

    .form-section h2 {
      text-align: left; /* konsisten kiri */
    }

    /* invitation grid */
    .invitation-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem 1rem;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .invitation-grid::-webkit-scrollbar {
      width: 4px;
    }
    .invitation-grid::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.05);
      border-radius: 10px;
    }
    .invitation-grid::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
    }

    .invitee-item {
      font-size: 0.95rem;
      font-weight: 400;
      color: #222;
      padding: 0.45rem 0;
      border-bottom: 1px dotted rgba(0,0,0,0.15);
      transition: 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .invitee-item:hover {
      color: #000;
      border-bottom-color: #000;
      padding-left: 4px;
    }

    /* form fields */
    .field {
      margin-bottom: 1.5rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #444;
      margin-bottom: 0.4rem;
      transition: 0.2s;
    }

    .field input {
      width: 100%;
      background: white;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 50px;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      transition: 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }

    .field input:focus {
      outline: none;
      border-color: #000;
      background: #ffffff;
      transform: scale(1.01);
      box-shadow: 0 8px 20px -12px rgba(0,0,0,0.2);
    }

    .field input::placeholder {
      color: #aaa;
      font-weight: 300;
    }

    .field:hover label {
      color: #000;
    }

    /* tombol sign */
    .sign-btn {
      background: #000;
      border: none;
      color: white;
      font-weight: 700;
      padding: 1rem 1.5rem;
      border-radius: 60px;
      font-size: 1rem;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #000;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 0.5rem;
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.3);
      overflow: hidden;
      position: relative;
    }

    .sign-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }

    .sign-btn:hover::before {
      width: 400px;
      height: 400px;
    }

    .sign-btn:hover {
      background: #222;
      transform: scale(0.98);
      box-shadow: 0 12px 30px -8px rgba(0,0,0,0.4);
    }

    .feedback-message {
      margin-top: 1rem;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      border-radius: 60px;
      text-align: center;
      background: white;
      border: 1px solid rgba(0,0,0,0.1);
      color: #000;
      display: none;
    }

    /* ROLEPLAY BANNER */
    .roleplay-footer {
      margin-top: 2.2rem;
      padding: 1.2rem 0 0.2rem;
      border-top: 1px solid rgba(0,0,0,0.1);
      text-align: center;
    }

    .roleplay-text {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 3px;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    .kachoo-brand {
      font-size: 2rem;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.3px;
      display: inline-block;
      position: relative;
    }

    .kachoo-brand::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 2px;
      background: #000;
      bottom: -4px;
      left: 0;
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .roleplay-footer:hover .kachoo-brand::after {
      transform: scaleX(1);
    }

    /* back to lobby */
    .back-lobby {
      text-align: right;
      margin-top: 1.5rem;
    }

    .back-lobby a {
      display: inline-block;
      color: #333;
      text-decoration: none;
      font-weight: 400;
      padding: 0.5rem 1.8rem;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 60px;
      transition: 0.2s;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
    }

    .back-lobby a:hover {
      background: #000;
      color: white;
      border-color: #000;
      transform: translateX(-3px);
    }

    /* notifikasi thank you */
    .notif-thanks {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      color: black;
      font-weight: 800;
      font-size: 2.2rem;
      padding: 1.5rem 3rem;
      border-radius: 70px;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
      z-index: 9999;
      animation: notifPop 1.4s ease forwards;
      white-space: nowrap;
      letter-spacing: -0.5px;
    }

    @keyframes notifPop {
      0% { opacity: 0; transform: translate(-50%, -30%) scale(0.8); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -70%) scale(0.9); }
    }

    /* ===== RESPONSIVE UNTUK MOBILE ===== */
    @media (max-width: 700px) {
      body {
        padding: 1rem;
        align-items: flex-start; /* biar ngga mentok atas */
        padding-top: 2rem;
        padding-bottom: 2rem;
      }

      .glass-card {
        padding: 1.5rem 1.2rem;
        border-radius: 40px;
      }

      .dashboard {
        grid-template-columns: 1fr; /* stack vertikal */
        gap: 1.2rem;
        margin: 1.2rem 0;
      }

      .invitation-section, .form-section {
        padding: 1.5rem 1.2rem;
        border-radius: 32px;
      }

      .invitation-section h2, .form-section h2 {
        font-size: 1.4rem;
        margin-bottom: 1rem;
      }

      .invitation-grid {
        grid-template-columns: 1fr; /* satu kolom di mobile */
        max-height: 250px;
      }

      .invitee-item {
        font-size: 0.9rem;
        white-space: normal; /* wrap jika perlu */
        overflow: visible;
      }

      .field input {
        padding: 0.8rem 1.2rem;
      }

      .sign-btn {
        padding: 0.9rem 1rem;
      }

      .roleplay-text {
        font-size: 0.9rem;
        letter-spacing: 2px;
      }

      .kachoo-brand {
        font-size: 1.8rem;
      }

      .back-lobby a {
        padding: 0.4rem 1.4rem;
        font-size: 0.85rem;
      }

      .notif-thanks {
        font-size: 1.6rem;
        padding: 1rem 2rem;
        white-space: normal;
        text-align: center;
        width: 80%;
      }
    }

    /* untuk layar sangat kecil */
    @media (max-width: 400px) {
      .glass-card {
        padding: 1.2rem 1rem;
      }

      .guestbook-header h1 {
        font-size: 2.2rem;
      }

      .guestbook-header p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <!-- background motion tipis -->
  <div class="motion-bg" id="motionBg"></div>

  <div class="glass-card">
    <!-- GUESTBOOK HEADER -->
    <div class="guestbook-header">
      <h1>GUESTBOOK</h1>
      <p>sign the attendance</p>
    </div>

    <!-- grid invitation + form -->
    <div class="dashboard">
      <!-- INVITATION LIST -->
      <div class="invitation-section">
        <h2>Invitation</h2>
        <div class="invitation-grid" id="invitationGrid"></div>
      </div>

      <!-- FORM (hanya Fullname & Username) -->
      <div class="form-section">
        <h2>Sign here</h2>
        <div class="field">
          <label>Full name</label>
          <input type="text" id="fullNameInput" placeholder="e.g. John Doe" autocomplete="off">
        </div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="usernameInput" placeholder="@username" autocomplete="off">
        </div>
        <button class="sign-btn" id="signGuestbookBtn">Sign guestbook</button>
        <div id="formFeedback" class="feedback-message"></div>
      </div>
    </div>

    <!-- ROLEPLAY BANNER -->
    <div class="roleplay-footer">
      <div class="roleplay-text">For Roleplay Purpose Only</div>
      <div class="kachoo-brand">by The Kachoo</div>
    </div>

    <!-- back to lobby -->
    <div class="back-lobby">
      <a href="https://thekachoo.github.io/Office/" id="backToLobby">← Back to Lobby</a>
    </div>
  </div>

  <script>
    (function() {
      // Data invitation
      const komunitas = [
        "Kachoo Teams", "Urbanc Studio", "Cadence", "Modex", "Kriya Nusaca",
        "Amére", "Altday Project", "Our Dream", "TROY Bakery & Cafe", "Taskit",
        "Thesera", "A+Clothes", "Makarya", "Ayu Merona", "RAIA Group",
        "Studio 35°", "Pancarona Studio", "Ruang Rasa"
      ];

      const undangan = [
        "Rachel Theodora Hearst", "Beatrix Cecilia Atmadja", "Nawang Wulan and Partner",
        "Prudence Claire", "Cindy Lou", "Bagas Pradipta", "Marcelinus Chitraditya H.P",
        "Venus Dorothea", "Vishaka Niranjana", "Knox Caspian", "Arunika Jingga",
        "Grayson Tahitoe", "Adiratna Danudihardja", "Gabriel Luca Wirakusuma",
        "Sheila Kanna", "Elijah Gilead"
      ];
      const semuaNama = [...komunitas, ...undangan];

      // DOM elements
      const grid = document.getElementById('invitationGrid');
      const fullName = document.getElementById('fullNameInput');
      const userName = document.getElementById('usernameInput');
      const signBtn = document.getElementById('signGuestbookBtn');
      const feedback = document.getElementById('formFeedback');

      // render nama
      function renderNames() {
        grid.innerHTML = '';
        semuaNama.forEach((nama) => {
          const div = document.createElement('div');
          div.className = 'invitee-item';
          div.textContent = nama;
          grid.appendChild(div);
        });
      }

      // notifikasi
      function showThankYou() {
        const notif = document.createElement('div');
        notif.className = 'notif-thanks';
        notif.textContent = 'Thank you!';
        document.body.appendChild(notif);
        setTimeout(() => {
          window.location.href = 'GH.html';
        }, 1400);
      }

      // fake submit
      async function submitToSheet(full, user) {
        const url = 'https://script.google.com/macros/s/AKfycbzH2V7J1U_8p0jX5sL3xK9mW6nR4tY7uI2oP3cE/exec';
        const payload = new URLSearchParams({ fullname: full, username: user });
        try {
          await fetch(url, { method: 'POST', mode: 'no-cors', body: payload });
        } catch (e) { console.log(e); }
      }

      async function handleSign() {
        const full = fullName.value.trim();
        const user = userName.value.trim();
        if (!full || !user) {
          feedback.style.display = 'block';
          feedback.textContent = 'Full name and username required';
          feedback.style.background = '#fee';
          feedback.style.color = '#c00';
          setTimeout(() => feedback.style.display = 'none', 2000);
          return;
        }

        signBtn.disabled = true;
        signBtn.textContent = 'Sending...';
        await submitToSheet(full, user);
        showThankYou();
        fullName.value = ''; userName.value = '';
        signBtn.disabled = false; signBtn.textContent = 'Sign guestbook';
      }

      signBtn.addEventListener('click', handleSign);
      userName.addEventListener('keypress', e => { if (e.key === 'Enter') handleSign(); });

      renderNames();

      // background particles sederhana
      const motionBg = document.getElementById('motionBg');
      for (let i = 0; i < 20; i++) {
        const span = document.createElement('span');
        span.style.left = Math.random() * 100 + '%';
        span.style.top = Math.random() * 100 + '%';
        span.style.animationDuration = (Math.random() * 15 + 10) + 's';
        span.style.animationDelay = (Math.random() * 5) + 's';
        motionBg.appendChild(span);
      }
      for (let i = 0; i < 3; i++) {
        const line = document.createElement('div');
        line.className = 'line';
        line.style.top = (20 + i * 25) + '%';
        line.style.animationDelay = (i * 0.8) + 's';
        motionBg.appendChild(line);
      }
    })();
  </script>
</body>
      </html>
