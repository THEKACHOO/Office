<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Grand Hall · Attend the Event</title>
  <!-- Inter font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #000000;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .grandhall-container {
      max-width: 1200px;
      width: 100%;
      background: #ffffff;
      border: 2px solid #000000;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      padding: 2rem 2rem;
    }

    /* header */
    .hall-header {
      text-align: left;
      margin-bottom: 2.2rem;
      border-bottom: 2px solid #000;
      padding-bottom: 1rem;
    }

    .hall-header h1 {
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #000;
      line-height: 1.1;
    }

    .hall-header p {
      color: #333;
      font-size: 1.2rem;
      font-weight: 400;
      margin-top: 0.5rem;
    }

    /* dua kolom utama */
    .top-section {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr;
      gap: 2rem;
      margin-bottom: 1rem;
    }

    /* INVITATION LIST – hanya teks, tanpa efek tombol */
    .invitation-box {
      background: #f5f5f5;
      border: 2px solid #000;
      border-radius: 28px;
      padding: 1.6rem 1.5rem;
    }

    .invitation-box h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #000;
      margin-bottom: 1.5rem;
      letter-spacing: -0.3px;
    }

    .invitation-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.4rem 1rem;
      max-height: 340px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .invitation-grid::-webkit-scrollbar {
      width: 5px;
    }
    .invitation-grid::-webkit-scrollbar-track {
      background: #ddd;
    }
    .invitation-grid::-webkit-scrollbar-thumb {
      background: #000;
      border-radius: 12px;
    }

    /* NAMA INVITATION: hanya teks biasa, tanpa border, tanpa background kotak */
    .invitee-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: #111;
      padding: 0.3rem 0;
      border-bottom: 1px dotted #aaa;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* GUESTBOOK FORM */
    .guestbook-box {
      background: #ffffff;
      border: 2px solid #000;
      border-radius: 28px;
      padding: 1.6rem 1.5rem;
    }

    .guestbook-box h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #000;
      margin-bottom: 1.8rem;
      letter-spacing: -0.3px;
    }

    .field-group {
      margin-bottom: 1.4rem;
    }

    .field-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 0.3rem;
      letter-spacing: 0.3px;
    }

    .field-group input {
      width: 100%;
      background: #ffffff;
      border: 2px solid #000;
      border-radius: 50px;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: 0.1s;
    }

    .field-group input:focus {
      outline: none;
      background: #f2f2f2;
      border-color: #000;
    }

    .field-group input::placeholder {
      color: #888;
      font-weight: 300;
      opacity: 0.9;
    }

    .sign-btn {
      background: #000;
      border: none;
      color: #ffffff;
      font-weight: 700;
      padding: 1rem 1.8rem;
      border-radius: 60px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.15s;
      border: 2px solid #000;
      width: 100%;
      margin-top: 0.8rem;
      letter-spacing: 0.3px;
    }

    .sign-btn:hover {
      background: #333;
      border-color: #333;
    }

    .sign-btn:active {
      background: #000;
      transform: scale(0.98);
    }

    /* notifikasi "Thank you!" */
    .thankyou-notif {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000;
      color: #fff;
      font-weight: 700;
      font-size: 2rem;
      padding: 1.5rem 3rem;
      border-radius: 60px;
      border: 3px solid #fff;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      z-index: 9999;
      animation: popFade 1.5s ease forwards;
      text-align: center;
      white-space: nowrap;
    }

    @keyframes popFade {
      0% { opacity: 0; transform: translate(-50%, -30%); }
      20% { opacity: 1; transform: translate(-50%, -50%); }
      80% { opacity: 1; transform: translate(-50%, -50%); }
      100% { opacity: 0; transform: translate(-50%, -70%); }
    }

    .form-message {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: #000;
      background: #eaeaea;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      text-align: center;
      font-weight: 500;
      border: 1px solid #aaa;
      display: none;
    }

    /* Back to Lobby link sesuai URL */
    .back-lobby-link {
      margin-top: 2rem;
      text-align: right;
    }

    .back-btn {
      display: inline-block;
      background: transparent;
      border: 2px solid #000;
      color: #000;
      font-weight: 600;
      padding: 0.7rem 2rem;
      border-radius: 60px;
      text-decoration: none;
      transition: 0.15s;
      font-size: 0.95rem;
    }

    .back-btn:hover {
      background: #000;
      color: #fff;
    }

    /* ========== TAMPILAN MOBILE LEBIH KEREN ========== */
    @media (max-width: 800px) {
      .top-section {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      .invitation-grid {
        max-height: 260px;
        grid-template-columns: repeat(2, 1fr); /* tetap dua kolom agar kompak */
      }
      .invitee-name {
        font-size: 0.9rem;
        white-space: normal; /* jadi bisa wrap, lebih enak di mobile */
        overflow: visible;
        text-overflow: clip;
        border-bottom: 1px dashed #aaa;
        padding: 0.4rem 0;
      }
      .guestbook-box {
        padding: 1.4rem;
      }
    }

    @media (max-width: 500px) {
      body {
        padding: 0.8rem;
      }
      .grandhall-container {
        padding: 1.5rem 1rem;
        border-radius: 28px;
      }
      .hall-header h1 {
        font-size: 2.2rem;
      }
      .hall-header p {
        font-size: 1rem;
      }
      .invitation-box, .guestbook-box {
        padding: 1.2rem;
        border-radius: 22px;
      }
      .invitation-grid {
        grid-template-columns: 1fr; /* mobile: satu kolom, lebih bersih */
        gap: 0.2rem;
        max-height: 300px;
      }
      .invitee-name {
        font-size: 0.95rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid #ccc;
      }
      .field-group input {
        padding: 0.8rem 1rem;
        font-size: 0.95rem;
      }
      .sign-btn {
        padding: 0.9rem 1rem;
      }
      .back-btn {
        padding: 0.6rem 1.5rem;
        font-size: 0.9rem;
      }
      .thankyou-notif {
        font-size: 1.5rem;
        padding: 1.2rem 2rem;
        white-space: normal;
        width: 80%;
        text-align: center;
      }
    }

    /* tambahan sentuhan: pastikan invitee-name tidak seperti tombol */
    .invitee-name {
      background: transparent;
      border: none;
      box-shadow: none;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="grandhall-container">
    <!-- header: Attend the Event -->
    <div class="hall-header">
      <h1>Attend the Event</h1>
      <p>Grand Hall · Kachoo Building</p>
    </div>

    <!-- bagian kiri: invitation list + kanan: guestbook form -->
    <div class="top-section">
      <!-- INVITATION LIST – TANPA TOMBOL, HANYA NAMA -->
      <div class="invitation-box">
        <h2>Invitation</h2>
        <div class="invitation-grid" id="invitationGrid"></div>
      </div>

      <!-- GUESTBOOK FORM dengan contoh placeholder yang diminta -->
      <div class="guestbook-box">
        <h2>Guestbook</h2>
        <div class="field-group">
          <label>Full name</label>
          <input type="text" id="fullNameInput" placeholder="Contoh: Nama Depan Nama Belakang" autocomplete="off">
        </div>
        <div class="field-group">
          <label>Username</label>
          <input type="text" id="usernameInput" placeholder="@Contoh" autocomplete="off">
        </div>
        <button class="sign-btn" id="signGuestbookBtn">Sign guestbook</button>
        <div id="formFeedback" class="form-message"></div>
      </div>
    </div>

    <!-- Back to Lobby link (sesuai URL: https://thekachoo.github.io/Office/) -->
    <div class="back-lobby-link">
      <a href="https://thekachoo.github.io/Office/" class="back-btn" id="backToLobby">← Back to Lobby</a>
    </div>
  </div>

  <script>
    (function() {
      // ==================== DATA INVITATION (list nama saja) ====================
      const komunitas = [
        "Kachoo Teams", "Urbanc Studio", "Cadence", "Modex", "Kriya Nusaca",
        "Amére", "Altday Project", "Our Dream", "TROY Bakery & Cafe", "Taskit",
        "Thesera", "A+Clothes", "Makarya", "Ayu Merona", "RAIA Group",
        "Studio 35°", "Pancarona Studio", "Ruang Rasa"
      ];

      const undangan = [
        "Rachel Theodora Hearst", "Beatrix Cecilia Atmadja", "Nawang Wulan and Partner",
        "Prudence Claire", "Cindy Lou", "Bagas Pradipta", "Marcelinus Chitraditya H.P",
        "Venus Dorothea", "Vishaka Niranjana", "Knox Caspian", "Arunika Jingga",
        "Grayson Tahitoe", "Adiratna Danudihardja", "Gabriel Luca Wirakusuma",
        "Sheila Kanna", "Elijah Gilead"
      ];

      // Gabungkan semua undangan (tanpa label apapun, sesuai permintaan)
      const semuaNamaUndangan = [...komunitas, ...undangan];

      // ==================== ELEMEN DOM ====================
      const invitationGrid = document.getElementById('invitationGrid');
      const fullNameInput = document.getElementById('fullNameInput');
      const usernameInput = document.getElementById('usernameInput');
      const signBtn = document.getElementById('signGuestbookBtn');
      const formFeedback = document.getElementById('formFeedback');
      const backBtn = document.getElementById('backToLobby'); // link sudah langsung ke URL

      // ==================== RENDER INVITATION (hanya teks) ====================
      function renderInvitation() {
        let html = '';
        semuaNamaUndangan.forEach(nama => {
          const safeNama = escapeHtml(nama);
          // Menggunakan <span> dengan class invitee-name, tanpa efek tombol
          html += `<div class="invitee-name">${safeNama}</div>`;
        });
        invitationGrid.innerHTML = html;
      }

      function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          if (m === '"') return '&quot;';
          return m;
        });
      }

      // ==================== NOTIFIKASI THANK YOU & REDIRECT ====================
      function showThankYouAndRedirect() {
        const notif = document.createElement('div');
        notif.className = 'thankyou-notif';
        notif.textContent = 'Thank you!';
        document.body.appendChild(notif);

        // Setelah animasi, refresh ke halaman yang sama (GH.html)
        setTimeout(() => {
          window.location.href = 'GH.html'; // redirect ke halaman grand hall (refresh)
        }, 1400);
      }

      // ==================== KIRIM KE SPREADSHEET via APPS SCRIPT ====================
      // GANTI URL INI DENGAN ENDPOINT APPS SCRIPT YAK
      const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzH2V7J1U_8p0jX5sL3xK9mW6nR4tY7uI2oP3cE/exec'; // contoh placeholder

      async function submitToSpreadsheet(fullname, username) {
        const payload = new URLSearchParams();
        payload.append('fullname', fullname);
        payload.append('username', username);
        
        try {
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // no-cors tetap mengirim
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: payload
          });
          return true;
        } catch (error) {
          console.warn('Gagal kirim ke spreadsheet:', error);
          return false;
        }
      }

      // ==================== HANDLE SIGN ====================
      async function handleSign() {
        const fullname = fullNameInput.value.trim();
        const username = usernameInput.value.trim();

        if (fullname === '' || username === '') {
          formFeedback.style.display = 'block';
          formFeedback.textContent = 'Nama dan username harus diisi';
          formFeedback.style.background = '#ffeeee';
          formFeedback.style.color = '#cc0000';
          formFeedback.style.border = '1px solid #cc0000';
          setTimeout(() => {
            formFeedback.style.display = 'none';
          }, 2000);
          return;
        }

        // Validasi sederhana username minimal berisi @? tidak wajib, sesuai contoh
        // Boleh apa saja

        signBtn.disabled = true;
        signBtn.textContent = 'Mengirim...';

        await submitToSpreadsheet(fullname, username);

        // Tampilkan notifikasi dan redirect
        showThankYouAndRedirect();

        // Reset (opsional karena akan redirect)
        fullNameInput.value = '';
        usernameInput.value = '';
        signBtn.disabled = false;
        signBtn.textContent = 'Sign guestbook';
      }

      // ==================== EVENT LISTENERS ====================
      signBtn.addEventListener('click', handleSign);

      fullNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          usernameInput.focus();
        }
      });
      usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSign();
        }
      });

      // Back to Lobby langsung menggunakan href, jadi tidak perlu javascript lagi
      // Tapi jika ingin menjaga agar tidak ada konflik, kita biarkan saja.

      // ==================== INIT ====================
      renderInvitation();

      // Catatan: ganti APPS_SCRIPT_URL dengan endpoint asli dari Apps Script.
    })();
  </script>
</body>
          </html>
