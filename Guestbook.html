<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the kachoo · guestbook</title>
  <!-- Inter font + space grotesk untuk aksen -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000; /* hitam absolut */
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      position: relative;
      color: #fff;
    }

    /* LAYER ANIMASI BACKGROUND - gerak sangat halus, modern */
    .motion-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .motion-bg span {
      position: absolute;
      display: block;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
      animation: floatParticle 12s infinite linear;
    }

    /* 50 partikel kecil yang bergerak acak */
    @keyframes floatParticle {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-120vh) translateX(20px) scale(0.5); opacity: 0; }
    }

    /* garis-garis animasi di background */
    .motion-bg .line {
      position: absolute;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      animation: slideLine 8s infinite ease-in-out;
    }

    @keyframes slideLine {
      0% { transform: translateX(-100%); opacity: 0; }
      50% { opacity: 0.4; }
      100% { transform: translateX(100%); opacity: 0; }
    }

    /* CARD UTAMA - glass putih bersih dengan border hitam/putih */
    .glass-card {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 1100px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px) saturate(200%);
      -webkit-backdrop-filter: blur(16px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 60px;
      padding: 2.8rem 2.8rem;
      box-shadow: 0 30px 60px -20px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.1);
      transition: box-shadow 0.3s, border-color 0.3s;
      animation: cardAppear 0.8s ease-out;
    }

    @keyframes cardAppear {
      0% { opacity: 0; transform: scale(0.98) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .glass-card:hover {
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 40px 70px -15px black, inset 0 1px 2px rgba(255,255,255,0.15);
    }

    /* HEADER GUESTBOOK di tengah atas */
    .guestbook-header {
      text-align: center;
      margin-bottom: 3rem;
      animation: slideDown 0.7s ease-out;
    }

    @keyframes slideDown {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .guestbook-header h1 {
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -2px;
      color: white;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
      animation: glowPulse 3s infinite alternate;
    }

    @keyframes glowPulse {
      0% { text-shadow: 0 0 10px rgba(255,255,255,0.3); }
      100% { text-shadow: 0 0 30px rgba(255,255,255,0.6); }
    }

    .guestbook-header p {
      font-size: 1.2rem;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      display: inline-block;
      padding-bottom: 0.4rem;
    }

    /* grid dua kolom: kiri invitation, kanan form */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      margin: 2rem 0 2.5rem;
    }

    /* INVITATION LIST - minimal, banyak whitespace */
    .invitation-section {
      background: rgba(0,0,0,0.3);
      border-radius: 48px;
      padding: 2rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
      transition: 0.3s;
      animation: fadeLeft 0.9s ease;
    }

    @keyframes fadeLeft {
      0% { opacity: 0; transform: translateX(-30px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    .invitation-section:hover {
      border-color: rgba(255,255,255,0.3);
      background: rgba(20,20,20,0.4);
    }

    .invitation-section h2 {
      font-size: 1.8rem;
      font-weight: 500;
      color: white;
      margin-bottom: 1.8rem;
      letter-spacing: -0.5px;
      border-left: 4px solid white;
      padding-left: 1.2rem;
    }

    .invitation-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem 1.2rem;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .invitation-grid::-webkit-scrollbar {
      width: 5px;
    }
    .invitation-grid::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    .invitation-grid::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
    }

    .invitee-item {
      font-size: 1rem;
      font-weight: 400;
      color: rgba(255,255,255,0.9);
      padding: 0.5rem 0.2rem;
      border-bottom: 1px dotted rgba(255,255,255,0.2);
      transition: 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: nameFade 0.5s ease;
    }

    @keyframes nameFade {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .invitee-item:hover {
      color: white;
      border-bottom-color: white;
      padding-left: 4px;
    }

    /* FORM SECTION - glass effect lebih tebal */
    .form-section {
      background: rgba(255,255,255,0.05);
      border-radius: 48px;
      padding: 2rem 2rem;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      transition: 0.3s;
      animation: fadeRight 0.9s ease;
    }

    @keyframes fadeRight {
      0% { opacity: 0; transform: translateX(30px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    .form-section:hover {
      border-color: rgba(255,255,255,0.35);
      background: rgba(40,40,40,0.2);
    }

    .form-section h2 {
      font-size: 1.8rem;
      font-weight: 500;
      color: white;
      margin-bottom: 2.2rem;
      letter-spacing: -0.5px;
      text-align: right;
      border-right: 4px solid white;
      padding-right: 1.2rem;
    }

    .field {
      margin-bottom: 2rem;
      position: relative;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 0.5rem;
      transition: 0.2s;
    }

    .field input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 1rem 1.5rem;
      font-size: 1.1rem;
      color: white;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      backdrop-filter: blur(4px);
      transition: 0.25s all cubic-bezier(0.2, 0.9, 0.3, 1);
    }

    .field input:focus {
      outline: none;
      border-color: white;
      background: rgba(30,30,30,0.8);
      transform: scale(1.02);
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
    }

    .field input::placeholder {
      color: rgba(255,255,255,0.25);
      font-weight: 300;
      font-size: 0.95rem;
    }

    .field:hover label {
      color: white;
      transform: translateX(5px);
    }

    /* tombol sign */
    .sign-btn {
      background: white;
      border: none;
      color: black;
      font-weight: 700;
      padding: 1.1rem 2rem;
      border-radius: 60px;
      font-size: 1.1rem;
      width: 100%;
      cursor: pointer;
      transition: 0.25s all cubic-bezier(0.2, 0.9, 0.3, 1);
      border: 1px solid white;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 0.5rem;
      box-shadow: 0 10px 30px -10px rgba(255,255,255,0.3);
      position: relative;
      overflow: hidden;
    }

    .sign-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.1);
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }

    .sign-btn:hover::before {
      width: 400px;
      height: 400px;
    }

    .sign-btn:hover {
      background: #f0f0f0;
      transform: scale(0.98);
      box-shadow: 0 15px 40px -5px white;
    }

    .sign-btn:active {
      transform: scale(0.96);
    }

    .feedback-message {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      padding: 0.7rem 1.2rem;
      border-radius: 60px;
      text-align: center;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      display: none;
      animation: feedbackPop 0.3s ease;
    }

    @keyframes feedbackPop {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ROLEPLAY BANNER - menggantikan area pinterest */
    .roleplay-footer {
      margin-top: 2.5rem;
      padding: 1.5rem 0 0.5rem;
      border-top: 1px solid rgba(255,255,255,0.15);
      text-align: center;
      animation: fadeUp 1s ease;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .roleplay-text {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .kachoo-brand {
      font-size: 2.2rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
      display: inline-block;
      position: relative;
      animation: softGlow 3s infinite alternate;
    }

    @keyframes softGlow {
      0% { text-shadow: 0 0 10px white; }
      100% { text-shadow: 0 0 30px white, 0 0 10px rgba(255,255,255,0.5); }
    }

    .kachoo-brand::before, .kachoo-brand::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 2px;
      background: white;
      bottom: -5px;
      left: 0;
      transform: scaleX(0);
      transition: transform 0.4s;
    }

    .roleplay-footer:hover .kachoo-brand::before {
      transform: scaleX(1);
    }

    /* back to lobby */
    .back-lobby {
      text-align: right;
      margin-top: 2rem;
    }

    .back-lobby a {
      display: inline-block;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-weight: 400;
      padding: 0.6rem 2rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 60px;
      transition: 0.2s;
      font-size: 0.95rem;
      backdrop-filter: blur(8px);
    }

    .back-lobby a:hover {
      background: white;
      color: black;
      border-color: white;
      transform: translateX(-5px);
    }

    /* notifikasi thank you */
    .notif-thanks {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      color: black;
      font-weight: 800;
      font-size: 2.5rem;
      padding: 1.8rem 3.5rem;
      border-radius: 80px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 40px 70px black;
      z-index: 9999;
      animation: notifPop 1.4s ease forwards;
      white-space: nowrap;
      letter-spacing: -1px;
    }

    @keyframes notifPop {
      0% { opacity: 0; transform: translate(-50%, -30%) scale(0.8); backdrop-filter: blur(0); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); backdrop-filter: blur(10px); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1); backdrop-filter: blur(10px); }
      100% { opacity: 0; transform: translate(-50%, -70%) scale(0.9); backdrop-filter: blur(0); }
    }

    @media (max-width: 800px) {
      .dashboard { grid-template-columns: 1fr; }
      .glass-card { padding: 1.8rem; }
      .invitation-grid { grid-template-columns: 1fr; }
      .form-section h2 { text-align: left; border-right: none; border-left: 4px solid white; padding-left: 1.2rem; }
    }
  </style>
</head>
<body>
  <!-- background animasi -->
  <div class="motion-bg" id="motionBg"></div>

  <div class="glass-card">
    <!-- GUESTBOOK HEADER di tengah atas -->
    <div class="guestbook-header">
      <h1>GUESTBOOK</h1>
      <p>sign the attendance</p>
    </div>

    <!-- grid invitation + form -->
    <div class="dashboard">
      <!-- INVITATION LIST (kiri) -->
      <div class="invitation-section">
        <h2>Invitation</h2>
        <div class="invitation-grid" id="invitationGrid"></div>
      </div>

      <!-- FORM (kanan) dengan FULLNAME & USERNAME saja -->
      <div class="form-section">
        <h2>Sign here</h2>
        <div class="field">
          <label>Full name</label>
          <input type="text" id="fullNameInput" placeholder="e.g. John Doe" autocomplete="off">
        </div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="usernameInput" placeholder="@username" autocomplete="off">
        </div>
        <button class="sign-btn" id="signGuestbookBtn">Sign guestbook</button>
        <div id="formFeedback" class="feedback-message"></div>
      </div>
    </div>

    <!-- ROLEPLAY BANNER (pengganti area pinterest) -->
    <div class="roleplay-footer">
      <div class="roleplay-text">For Roleplay Purpose Only</div>
      <div class="kachoo-brand">by The Kachoo</div>
    </div>

    <!-- back to lobby -->
    <div class="back-lobby">
      <a href="https://thekachoo.github.io/Office/" id="backToLobby">← Back to Lobby</a>
    </div>
  </div>

  <script>
    (function() {
      // Data invitation
      const komunitas = [
        "Kachoo Teams", "Urbanc Studio", "Cadence", "Modex", "Kriya Nusaca",
        "Amére", "Altday Project", "Our Dream", "TROY Bakery & Cafe", "Taskit",
        "Thesera", "A+Clothes", "Makarya", "Ayu Merona", "RAIA Group",
        "Studio 35°", "Pancarona Studio", "Ruang Rasa"
      ];

      const undangan = [
        "Rachel Theodora Hearst", "Beatrix Cecilia Atmadja", "Nawang Wulan and Partner",
        "Prudence Claire", "Cindy Lou", "Bagas Pradipta", "Marcelinus Chitraditya H.P",
        "Venus Dorothea", "Vishaka Niranjana", "Knox Caspian", "Arunika Jingga",
        "Grayson Tahitoe", "Adiratna Danudihardja", "Gabriel Luca Wirakusuma",
        "Sheila Kanna", "Elijah Gilead"
      ];
      const semuaNama = [...komunitas, ...undangan];

      // DOM elements
      const grid = document.getElementById('invitationGrid');
      const fullName = document.getElementById('fullNameInput');
      const userName = document.getElementById('usernameInput');
      const signBtn = document.getElementById('signGuestbookBtn');
      const feedback = document.getElementById('formFeedback');

      // render nama dengan animasi bertahap
      function renderNames() {
        grid.innerHTML = '';
        semuaNama.forEach((nama, index) => {
          const div = document.createElement('div');
          div.className = 'invitee-item';
          div.textContent = nama;
          div.style.animationDelay = (index * 0.02) + 's';
          grid.appendChild(div);
        });
      }

      // notifikasi
      function showThankYou() {
        const notif = document.createElement('div');
        notif.className = 'notif-thanks';
        notif.textContent = 'Thank you!';
        document.body.appendChild(notif);
        setTimeout(() => {
          window.location.href = 'GH.html';
        }, 1400);
      }

      // fake submit
      async function submitToSheet(full, user) {
        const url = 'https://script.google.com/macros/s/AKfycbzH2V7J1U_8p0jX5sL3xK9mW6nR4tY7uI2oP3cE/exec';
        const payload = new URLSearchParams({ fullname: full, username: user });
        try {
          await fetch(url, { method: 'POST', mode: 'no-cors', body: payload });
        } catch (e) { console.log(e); }
      }

      async function handleSign() {
        const full = fullName.value.trim();
        const user = userName.value.trim();
        if (!full || !user) {
          feedback.style.display = 'block';
          feedback.textContent = 'Full name and username required';
          feedback.style.background = 'rgba(255,80,80,0.2)';
          feedback.style.color = '#ffb0b0';
          setTimeout(() => feedback.style.display = 'none', 2000);
          return;
        }

        signBtn.disabled = true;
        signBtn.textContent = 'Sending...';
        await submitToSheet(full, user);
        showThankYou();
        fullName.value = ''; userName.value = '';
        signBtn.disabled = false; signBtn.textContent = 'Sign guestbook';
      }

      signBtn.addEventListener('click', handleSign);
      userName.addEventListener('keypress', e => { if (e.key === 'Enter') handleSign(); });

      renderNames();

      // background particles (animasi tambahan)
      const motionBg = document.getElementById('motionBg');
      for (let i = 0; i < 40; i++) {
        const span = document.createElement('span');
        const size = Math.random() * 4 + 1;
        span.style.width = size + 'px';
        span.style.height = size + 'px';
        span.style.left = Math.random() * 100 + '%';
        span.style.top = Math.random() * 100 + '%';
        span.style.animationDuration = (Math.random() * 10 + 8) + 's';
        span.style.animationDelay = (Math.random() * 5) + 's';
        motionBg.appendChild(span);
      }
      for (let i = 0; i < 4; i++) {
        const line = document.createElement('div');
        line.className = 'line';
        line.style.top = (20 + i * 20) + '%';
        line.style.animationDelay = (i * 0.5) + 's';
        motionBg.appendChild(line);
      }
    })();
  </script>
</body>
                       </html>
