<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Elevator Hitam - Pintu Buka Tutup</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      color: #FFFFFF;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    .elevator-stage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .elevator-shaft {
      position: relative;
      width: 90%;
      max-width: 680px;
      aspect-ratio: 3 / 4;
      background: #0f0f0f;
      border-radius: 32px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.03);
      border: 1px solid #2a2a2a;
      overflow: hidden;
      cursor: pointer;
    }

    .elevator-interior {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #181818 0%, #080808 100%);
      z-index: 1;
    }

    .elevator-interior::before {
      content: "";
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      pointer-events: none;
    }

    .door-left, .door-right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 40%, #2a2a2a, #0a0a0a);
      box-shadow: inset -3px 0 10px rgba(0,0,0,0.8), inset 1px 0 2px rgba(255,255,255,0.08);
      z-index: 20;
      transition: transform 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.05);
      backdrop-filter: blur(1px);
    }

    .door-left {
      left: 0;
      border-right: 1px solid #3a3a3a;
      border-radius: 0 12px 12px 0;
    }

    .door-right {
      right: 0;
      border-left: 1px solid #3a3a3a;
      border-radius: 12px 0 0 12px;
    }

    .door-left::after, .door-right::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 8px;
      height: 44px;
      background: #6a6a6a;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
      transform: translateY(-50%);
    }
    .door-left::after {
      right: 32px;
    }
    .door-right::after {
      left: 32px;
    }

    .door-left::before, .door-right::before {
      content: "";
      position: absolute;
      top: 20%;
      width: 3px;
      height: 60%;
      background: rgba(100,100,100,0.5);
      left: 38%;
      border-radius: 2px;
    }
    .door-right::before {
      left: auto;
      right: 38%;
    }

    .door-open .door-left {
      transform: translateX(-101%);
    }
    .door-open .door-right {
      transform: translateX(101%);
    }

    .door-closed .door-left {
      transform: translateX(0%);
    }
    .door-closed .door-right {
      transform: translateX(0%);
    }

    .indicator-light {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 14px;
      background: #2a2a2a;
      border-radius: 20px;
      z-index: 25;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.8), 0 0 2px rgba(255,255,255,0.2);
      transition: all 0.2s;
    }

    .door-open .indicator-light {
      background: #3a8c6e;
      box-shadow: 0 0 12px #3a8c6e;
    }

    .floor-panel {
      position: absolute;
      bottom: 28px;
      left: 20px;
      background: rgba(8, 8, 8, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 48px;
      padding: 14px 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 260px;
      z-index: 30;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    .floor-btn {
      background: #202020;
      border: none;
      color: #eaeaea;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: 'Inter', monospace;
      letter-spacing: 0.3px;
      box-shadow: 0 1px 2px black;
    }

    .floor-btn:hover {
      background: #3a3a3a;
      transform: translateY(-1px);
    }

    .floor-btn:active {
      transform: scale(0.96);
      background: #4a6a6a;
    }

    .floor-btn.disabled-floor {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .control-panel {
      position: absolute;
      bottom: 28px;
      right: 20px;
      background: rgba(8, 8, 8, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 48px;
      padding: 12px 20px;
      display: flex;
      gap: 16px;
      z-index: 30;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .ctrl-btn {
      background: #2c2c2c;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .ctrl-btn:active {
      transform: scale(0.96);
    }

    .ctrl-btn:hover {
      background: #424242;
    }

    .floor-indicator {
      position: absolute;
      top: 28px;
      left: 28px;
      background: #000000aa;
      backdrop-filter: blur(10px);
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      border-left: 3px solid #c0a050;
      z-index: 30;
      font-family: monospace;
      letter-spacing: 1px;
    }

    .notification {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      background: #111111dd;
      backdrop-filter: blur(20px);
      color: #f0f0f0;
      padding: 10px 28px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.85rem;
      border: 1px solid #6a6a6a;
      z-index: 2000;
      pointer-events: none;
      white-space: nowrap;
      font-family: monospace;
    }

    @keyframes elevatorShake {
      0% { transform: translateX(0px) translateY(0px); }
      25% { transform: translateX(-2px) translateY(1px); }
      50% { transform: translateX(2px) translateY(-1px); }
      75% { transform: translateX(-1px) translateY(1px); }
      100% { transform: translateX(0) translateY(0); }
    }

    .shake-effect {
      animation: elevatorShake 0.25s ease-in-out;
    }

    @media (max-width: 650px) {
      .floor-panel { padding: 10px 12px; gap: 8px; bottom: 20px; left: 12px; max-width: 200px; }
      .control-panel { padding: 8px 14px; gap: 10px; bottom: 20px; right: 12px; }
      .floor-btn { padding: 5px 12px; font-size: 0.7rem; }
      .ctrl-btn { padding: 6px 14px; font-size: 0.75rem; }
      .floor-indicator { font-size: 0.75rem; top: 18px; left: 18px; }
      .indicator-light { width: 36px; height: 10px; top: 14px; }
    }

    @media (max-width: 480px) {
      .floor-panel { max-width: 170px; gap: 6px; }
      .floor-btn { padding: 4px 10px; font-size: 0.65rem; }
    }
  </style>
</head>
<body>

<div class="elevator-stage">
  <div class="elevator-shaft" id="elevatorShaft">
    <div class="elevator-interior"></div>
    <div class="door-left" id="doorLeft"></div>
    <div class="door-right" id="doorRight"></div>
    <div class="indicator-light" id="indicatorLight"></div>
    
    <div class="floor-panel" id="floorPanel"></div>
    
    <div class="control-panel">
      <button class="ctrl-btn" id="openDoorBtn">BUKA PINTU</button>
      <button class="ctrl-btn" id="closeDoorBtn">TUTUP PINTU</button>
    </div>
    
    <div class="floor-indicator" id="floorIndicator">LANTAI LOBBY</div>
  </div>
</div>

<div id="notificationMsg" class="notification" style="display: none;"></div>

<script>
  (function() {
    let isDoorOpen = false;
    let currentFloor = "LOBBY";
    let isMoving = false;
    
    const floorsConfig = [
      { label: "LOBBY", targetUrl: "Lobby.html", restricted: false, display: "LOBBY" },
      { label: "B1", targetUrl: "Basement.html", restricted: false, display: "BASEMENT" },
      { label: "L1", targetUrl: "L1.html", restricted: false, display: "LANTAI 1" },
      { label: "L2", targetUrl: null, restricted: true, display: "LANTAI 2" },
      { label: "L3", targetUrl: null, restricted: true, display: "LANTAI 3" },
      { label: "ROOF", targetUrl: null, restricted: true, display: "ROOFTOP" }
    ];
    
    const elevatorShaft = document.getElementById('elevatorShaft');
    const openBtn = document.getElementById('openDoorBtn');
    const closeBtn = document.getElementById('closeDoorBtn');
    const floorIndicator = document.getElementById('floorIndicator');
    const notificationDiv = document.getElementById('notificationMsg');
    const floorPanelDiv = document.getElementById('floorPanel');
    
    function showNotification(message, isError = false) {
      notificationDiv.textContent = message;
      notificationDiv.style.display = 'block';
      notificationDiv.style.background = isError ? '#2a1010dd' : '#0a1a1add';
      notificationDiv.style.borderColor = isError ? '#aa5555' : '#6a8a6a';
      setTimeout(() => {
        notificationDiv.style.display = 'none';
      }, 2000);
    }
    
    function updateDoorVisual() {
      if (isDoorOpen) {
        elevatorShaft.classList.add('door-open');
        elevatorShaft.classList.remove('door-closed');
      } else {
        elevatorShaft.classList.add('door-closed');
        elevatorShaft.classList.remove('door-open');
      }
    }
    
    function openDoors(manual = true) {
      if (isDoorOpen) {
        if (manual) showNotification("Pintu sudah terbuka");
        return;
      }
      if (isMoving) {
        if (manual) showNotification("Lift sedang bergerak, tunggu sebentar");
        return;
      }
      isDoorOpen = true;
      updateDoorVisual();
      if (manual) showNotification("Pintu terbuka");
      elevatorShaft.classList.add('shake-effect');
      setTimeout(() => elevatorShaft.classList.remove('shake-effect'), 200);
    }
    
    function closeDoors(manual = true) {
      if (!isDoorOpen) {
        if (manual) showNotification("Pintu sudah tertutup");
        return;
      }
      if (isMoving) {
        if (manual) showNotification("Lift sedang bergerak");
        return;
      }
      isDoorOpen = false;
      updateDoorVisual();
      if (manual) showNotification("Pintu tertutup");
      elevatorShaft.classList.add('shake-effect');
      setTimeout(() => elevatorShaft.classList.remove('shake-effect'), 200);
    }
    
    function getFloorByLabel(label) {
      return floorsConfig.find(f => f.label === label);
    }
    
    function updateFloorIndicator(label) {
      const floorData = getFloorByLabel(label);
      if (floorData) {
        floorIndicator.innerText = `LANTAI ${floorData.display}`;
      } else {
        floorIndicator.innerText = `LANTAI ${label}`;
      }
    }
    
    function executeFloorTransition(targetFloor) {
      return new Promise((resolve) => {
        if (currentFloor === targetFloor.label) {
          resolve({ alreadyHere: true });
          return;
        }
        
        isMoving = true;
        elevatorShaft.classList.add('shake-effect');
        
        setTimeout(() => {
          elevatorShaft.classList.remove('shake-effect');
          currentFloor = targetFloor.label;
          updateFloorIndicator(currentFloor);
          isMoving = false;
          resolve({ alreadyHere: false });
        }, 350);
      });
    }
    
    async function handleFloorRequest(floor) {
      if (isMoving) {
        showNotification("Lift sedang bergerak, harap tunggu", true);
        return false;
      }
      
      const floorData = getFloorByLabel(floor.label);
      if (!floorData) {
        showNotification("Lantai tidak tersedia", true);
        return false;
      }
      
      if (floorData.restricted) {
        showNotification("Lantai ini hanya untuk karyawan", true);
        elevatorShaft.classList.add('shake-effect');
        setTimeout(() => elevatorShaft.classList.remove('shake-effect'), 300);
        return false;
      }
      
      if (currentFloor === floor.label && isDoorOpen) {
        showNotification(`Anda sudah berada di ${floorData.display} dan pintu terbuka`);
        return false;
      }
      
      if (currentFloor === floor.label && !isDoorOpen) {
        openDoors(true);
        return false;
      }
      
      if (isDoorOpen) {
        await closeDoors(false);
        await new Promise(resolve => setTimeout(resolve, 100));
      }
      
      const transition = await executeFloorTransition(floorData);
      
      await new Promise(resolve => setTimeout(resolve, 180));
      
      await openDoors(false);
      
      await new Promise(resolve => setTimeout(resolve, 300));
      
      if (floorData.targetUrl) {
        showNotification(`Membuka ${floorData.display}`);
        setTimeout(() => {
          window.location.href = floorData.targetUrl;
        }, 400);
      } else if (!floorData.restricted && !floorData.targetUrl) {
        showNotification(`${floorData.display} - tidak ada halaman tujuan`, false);
      }
      
      return true;
    }
    
    function buildFloorButtons() {
      floorPanelDiv.innerHTML = '';
      floorsConfig.forEach(floor => {
        const btn = document.createElement('button');
        btn.className = 'floor-btn';
        if (floor.restricted) {
          btn.classList.add('disabled-floor');
        }
        
        let displayText = floor.label;
        if (floor.label === 'LOBBY') displayText = 'LOBBY';
        else if (floor.label === 'B1') displayText = 'B1';
        else if (floor.label === 'L1') displayText = 'L1';
        else if (floor.label === 'L2') displayText = 'L2';
        else if (floor.label === 'L3') displayText = 'L3';
        else if (floor.label === 'ROOF') displayText = 'ROOF';
        
        btn.innerText = displayText;
        
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (isMoving) {
            showNotification("Lift sedang bergerak, tunggu sebentar", true);
            return;
          }
          await handleFloorRequest(floor);
        });
        
        floorPanelDiv.appendChild(btn);
      });
    }
    
    function initControls() {
      openBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openDoors(true);
      });
      
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeDoors(true);
      });
    }
    
    function addShaftClickInteraction() {
      elevatorShaft.addEventListener('click', (e) => {
        if (e.target.closest('.floor-btn') || e.target.closest('.ctrl-btn')) return;
        if (isMoving) {
          showNotification("Lift sedang bergerak", true);
          return;
        }
        if (isDoorOpen) {
          closeDoors(true);
        } else {
          openDoors(true);
        }
      });
    }
    
    function initializeElevator() {
      isDoorOpen = false;
      currentFloor = "LOBBY";
      isMoving = false;
      updateDoorVisual();
      updateFloorIndicator("LOBBY");
      buildFloorButtons();
      initControls();
      addShaftClickInteraction();
      showNotification("Lift siap | Pintu tertutup", false);
    }
    
    window.addEventListener('load', () => {
      initializeElevator();
    });
    
    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyO') {
        openDoors(true);
        e.preventDefault();
      } else if (e.code === 'KeyC') {
        closeDoors(true);
        e.preventDefault();
      }
    });
    
    const observer = new MutationObserver(() => {
      const interior = document.querySelector('.elevator-interior');
      if (interior) {
        if (isDoorOpen) {
          interior.style.background = "linear-gradient(135deg, #242424 0%, #101010 100%)";
        } else {
          interior.style.background = "linear-gradient(135deg, #181818 0%, #080808 100%)";
        }
      }
    });
    observer.observe(elevatorShaft, { attributes: true, attributeFilter: ['class'] });
  })();
</script>
</body>
</html>
